<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Watch TV Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
       <nav class="navbar">
         <img src="images/netflix-logo-.png" alt="Netflix" class="nav-logo">
         <button type="button" class="btn-signin">Sign In</button>
       </nav>
    </header>


    <main class="hero-section">
        <img src="images/netflix-background-.jpg" alt="" class="hero-background">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1 class="hero-heading">Unlimited movies, TV shows and more</h1>
            <p class="hero-subheading">starts at Rs 250, cancel anytime.</p>
            <p class="hero-description">
                Ready to watch? Enter your email to create or restart your membership.
            </p>

            <form class="hero-form" action="#" method="post">
                <label for="email" class="visually-hidden">Email address</label>
                <input
                      type="email"
                      id="email"
                      name="email"
                      class="email-input"
                      placeholder="Email address"
                      required
                >
                <button type="submit" class="btn-get-started">
                    Get Started <span class="btn-arrow">&#8250;</span>
                </button>
            </form>
        </div>
        
    </main>
</body>
</html>
